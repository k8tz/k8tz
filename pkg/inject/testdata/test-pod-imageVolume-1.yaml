apiVersion: v1
kind: Pod
metadata:
  annotations:
    k8tz.io/injected: "true"
    k8tz.io/timezone: Asia/Jerusalem
  name: nginx
spec:
  containers:
  - env:
    - name: TZ
      value: Asia/Jerusalem
    image: nginx
    name: nginx
    volumeMounts:
    - mountPath: /usr/share/zoneinfo
      name: k8tz
      readOnly: true
      subPath: usr/share/zoneinfo/
  volumes:
  - image:
      reference: k8tz:0.0.0
    name: k8tz
